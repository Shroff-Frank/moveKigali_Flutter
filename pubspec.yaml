name: movekigali
description: "A new Flutter project."
publish_to: 'none' # Prevent accidental publishing

version: 1.0.0+1

environment:
  sdk: ^3.10.8

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  font_awesome_flutter: ^11.0.0
  country_code_picker: ^3.0.0
  intl: ^0.18.0
  image_picker: ^1.0.4
  image_picker_web: ^3.1.1 
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  path_provider: ^2.0.15
  cloud_firestore: ^5.4.4
  firebase_storage: ^12.3.2
  firebase_crashlytics: ^4.1.3
  firebase_analytics: ^11.3.3
  firebase_messaging: ^15.1.3
  shared_preferences: ^2.2.0
  share_plus: ^6.0.0


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.10.0

# Flutter-specific configuration
flutter:
  uses-material-design: true

  assets:
    - assets/images/logo1.png
    - assets/images/anywhere.png
    - assets/images/track.png
    - assets/images/centre.png
    - assets/images/profile.jpeg
    - assets/icons/

# Configuration for flutter_launcher_icons
flutter_icons:
  android: true
  ios: true
  image_path: "assets/images/logo1.png"
  adaptive_icon_background: "#02515F"   # your teal brand color
  adaptive_icon_foreground: "assets/images/logo1.png"